<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="ask_container">
        <h1>I have a Question for you!</h1>

    <div class="container">
        <h1>Be My Valentine🌹🌹🌹?</h1>
        <div class="container2">
            <div class="Yes_cont">

            </div>

            <div class="clicked_yes">
                <img class="pic2 yes_click" src="./Convince pic/convince 7.jpg" alt="">

        <div class="convince">
            <video style = "display: none;" class="no_music" src="./sfx/Bro Please Why You Do crying tik tok meme sound effect.mp4"></video>
            <h1 class="bluff">Don't do this to me 🥺🥺🥺</h1>

                <img class="pic img_1" src="./Convince pic/sad cat.jpeg" alt="">
            </div>

    </div>
    <script src="script.js"></script>
